<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KartLog Pro - Home</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .welcome-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            width: 100%;
            max-width: 400px;
            margin-top: 30px;
        }
        .menu-card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            text-decoration: none;
            color: var(--text-main);
            transition: transform 0.2s;
            border-left: 5px solid var(--primary);
        }
        .menu-card:hover { transform: scale(1.02); }
        .menu-card h2 { margin: 0; font-size: 1.2rem; color: var(--primary); }
        .menu-card p { margin: 10px 0 0; font-size: 0.9rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <main class="main-wrapper">
        <header><img src="logo.svg" class="logo-img" alt="Logo"></header>
        <a href="index.html" style="text-decoration:none; color:var(--primary); font-weight:bold; font-size:0.8rem;">← TORNA ALLA HOME</a>
    <h1>Vademecum</h1>
        <div class="menu-grid">
            <a href="carburatore.html" class="menu-card">
                <h2>Carburatore</h2>
            </a>

            <a href="vdm_motore.html" class="menu-card">
                <h2>Motore</h2>
            </a>

            <a href="vademecum.html" class="menu-card">
                <h2>Pneumatici</h2>
            </a>
        </div>
    </main>
</body>
</html>
